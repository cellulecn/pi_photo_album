<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>相册管理</title>
<style>
body {
  font-family: "Segoe UI", "PingFang SC", sans-serif;
  background: #f0f2f5;
  margin: 0;
  padding: 0;
  text-align: center;
}
header {
  background: #2b3a67;
  color: #fff;
  padding: 15px 0;
  font-size: 1.5em;
  letter-spacing: 2px;
}
form {
  margin: 20px auto;
  padding: 15px;
  background: #fff;
  border-radius: 8px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  width: 90%;
  max-width: 400px;
}
input[type=file] {
  margin-bottom: 10px;
}
button {
  background: #2b3a67;
  color: #fff;
  border: none;
  padding: 8px 16px;
  border-radius: 6px;
  cursor: pointer;
}
button:hover {
  background: #3d4e8a;
}
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 15px;
  padding: 15px;
  max-width: 1000px;
  margin: 0 auto;
}
.card {
  background: #fff;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  overflow: hidden;
}
.card img {
  width: 100%;
  height: 140px;
  object-fit: cover;
}
.card p {
  margin: 8px 0 4px;
  font-size: 0.9em;
}
a.delete {
  display: inline-block;
  color: #d33;
  text-decoration: none;
  font-size: 0.85em;
  margin-bottom: 8px;
}
a.delete:hover {
  text-decoration: underline;
}
</style>
</head>
<body>
<header>📸 相册管理</header>

<form action="/upload" method="post" enctype="multipart/form-data">
  <input type="file" name="file" required>
  <br>
  <button type="submit">上传照片</button>
</form>

<div class="gallery">
{% for p in photos %}
  <div class="card">
    <img src="{{ url_for('static', filename='thumbs/' + p['filename']) }}">
    <p>{{ p['filename'] }}</p>
    <a class="delete" href="/delete/{{ p['id'] }}">删除</a>
  </div>
{% endfor %}
</div>

</body>
</html>
